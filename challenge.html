
<!DOCTYPE html>
<html>
<head>
<title>Challenge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1 id="title"></h1>

<p id="desc"></p>

<a id="download">Download File</a>

<h3>Submit Flag</h3>

<input id="flag" placeholder="flag">
<button onclick="submit()">Submit</button>

<p id="result"></p>

</div>

<script>

const url=new URLSearchParams(window.location.search)
const id=url.get("id")

document.getElementById("title").innerText=id
document.getElementById("download").href="/files/"+id+"/file.zip"

fetch("/description/"+id)
.then(r=>r.text())
.then(t=>document.getElementById("desc").innerText=t)

async function submit(){

const flag=document.getElementById("flag").value

const res=await fetch("/submit",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({challenge:id,flag})

})

document.getElementById("result").innerText=await res.text()

}

</script>

</body>
</html>
