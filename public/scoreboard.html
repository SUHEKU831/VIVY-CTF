<!DOCTYPE html>
<html>
<head>
<title>Scoreboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav>

<h2>⚡ MINI CTF</h2>

<div class="menu">
<a href="/">Challenges</a>
<a href="/scoreboard.html">Scoreboard</a>
</div>

</nav>

<div class="container">

<h1>Scoreboard</h1>

<ul id="board"></ul>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket=io()

socket.on("scoreboard",(data)=>{

const board=document.getElementById("board")

board.innerHTML=""

data.forEach((u,i)=>{

const li=document.createElement("li")
li.innerText=(i+1)+". "+u.username+" - "+u.score

board.appendChild(li)

})

})

socket.on("firstblood",(c)=>{
alert("🔥 FIRST BLOOD on "+c+"!")
})

</script>

</body>
</html>
